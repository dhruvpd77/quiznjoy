{% extends 'base.html' %}

{% block title %}Paper Generation - Admin{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{% url 'semesters:admin_dashboard' %}" class="inline-flex items-center text-blue-600 hover:text-blue-800 dark:text-indigo-300 dark:hover:text-indigo-200 font-semibold">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
            </svg>
            Back to Dashboard
        </a>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8 border border-slate-200 dark:border-slate-600">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 dark:text-white mb-2">Paper Generation</h1>
        <p class="text-gray-600 dark:text-slate-400 mb-8">Step 1: Select subject and number of options per question</p>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="subject" class="block text-sm font-medium text-gray-700 dark:text-slate-200 mb-2">
                    Select Subject <span class="text-red-600">*</span>
                </label>
                <select name="subject" id="subject" required
                        class="w-full px-4 py-3 border border-gray-300 dark:border-slate-600 dark:bg-slate-700 dark:text-white rounded-lg focus:ring-2 focus:ring-indigo-500">
                    <option value="">-- Choose a Subject --</option>
                    {% for s in subjects %}
                        <option value="{{ s.id }}">{{ s.name }} ({{ s.semester.name }}) – {{ s.mcq_count }} MCQs</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 dark:text-slate-200 mb-2">
                    Options per question in paper
                </label>
                <div class="space-y-2">
                    <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-slate-600 cursor-pointer hover:bg-indigo-50 dark:hover:bg-slate-700">
                        <input type="radio" name="options_count" value="6" checked>
                        <span class="text-gray-800 dark:text-slate-200"><strong>6 options:</strong> A–D from question, E) Error, F) None of the above</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-slate-600 cursor-pointer hover:bg-indigo-50 dark:hover:bg-slate-700">
                        <input type="radio" name="options_count" value="7">
                        <span class="text-gray-800 dark:text-slate-200"><strong>7 options:</strong> A–D from question, E) blank, F) Error, G) None of the above</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 rounded-lg border border-gray-200 dark:border-slate-600 cursor-pointer hover:bg-indigo-50 dark:hover:bg-slate-700">
                        <input type="radio" name="options_count" value="8">
                        <span class="text-gray-800 dark:text-slate-200"><strong>8 options:</strong> A–D from question, E–F) blank, G) Error, H) None of the above</span>
                    </label>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-semibold py-3 rounded-lg transition shadow-lg">
                Next: Select units & counts →
            </button>
        </form>
    </div>
</div>
{% endblock %}
